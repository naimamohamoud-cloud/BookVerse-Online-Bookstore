<head>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a class="navbar-brand" href="index.html">
            BookVerse
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse"
             id="navbarNav">

            <ul class="navbar-nav ms-auto">

                <li class="nav-item">
                    <a class="nav-link"
                       href="index.html">
                        Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="about.html">
                        About
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link"
                       href="contact.html">
                        Contact
                    </a>
                </li>

            </ul>

        </div>

    </div>
</nav>

    <div class="container my-5">

        <h1 class="text-center mb-4">
        Contact Us
        </h1>

       <p class="lead text-center">
        We are ready to help you with any questions you might have.
      </p>

    </div>

    <div class="container my-5">

    <form>

        <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control"placeholder="Enter your full name">
        </div>
        <div class="mb-3">
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control"placeholder="Enter your full name">
        </div>

        <div class="mb-3">
            <label class="form-label">Subject</label>
            <input type="text" class="form-control"placeholder="Enter the subject">
        </div>

        <div class="mb-3">
            <label class="form-label">Message</label>
            <textarea class="form-control" rows="5"placeholder="Type your message here"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">
            Send Message
        </button>

    </form>

</div>
      <div class="container my-5">

        <h3>Get in touch with us</h3>
        <p>Email: support@bookverse.com</p>
        <p>Phone: +254 763 278 988</p>

        <p>
        Address: BookVerse Headquarters,
        Nairobi, Kenya
    </p>

</div>
